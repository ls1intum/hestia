server:
  port: ${PORT:8081}

spring:
  application:
    name: examlense-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/examlense}
    username: ${DB_USER:examlense}
    password: ${DB_PASSWORD:examlense}
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates entity ↔ table parity
    open-in-view: false
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

storage:
  local:
    base-path: ${STORAGE_LOCAL_BASE_PATH:./data/storage}

learninggoalhub:
  base-url: ${LGH_BASE_URL:https://hestia-test.aet.cit.tum.de/learninggoalhub}

ai:
  openai-compatible:
    api-key: ${AI_API_KEY:}
    base-url: ${AI_BASE_URL:}
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173}
  # Simple bot/overload protection (no real user auth yet — single-user backend).
  auth:
    token: ${API_AUTH_TOKEN:dev-local-token}
  files:
    # HMAC key for signed file URLs. Keep separate from the auth token; when
    # unset the backend falls back to the token and logs a warning.
    signing-secret: ${FILES_SIGNING_SECRET:}
  ratelimit:
    requests: ${API_RATELIMIT_REQUESTS:300}
    window-seconds: ${API_RATELIMIT_WINDOW_SECONDS:10}
    # Trust X-Forwarded-For for client IPs only when behind a reverse proxy.
    behind-proxy: ${API_RATELIMIT_BEHIND_PROXY:false}

logging:
  level:
    org.springframework.security: INFO
