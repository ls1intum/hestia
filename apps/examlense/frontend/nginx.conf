# Preserve the original external scheme. Behind the shared TLS-terminating proxy the hop to
# this nginx is plain http, so $scheme is "http"; honour the proxy's X-Forwarded-Proto
# (https) when present so the server advertises https URLs (e.g. signed storage links).
map $http_x_forwarded_proto $fwd_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxied to the Spring server (same Docker network, ExamLense port 8081).
    location /api/ {
        proxy_pass http://server:8081;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $fwd_proto;
        proxy_set_header X-Forwarded-Host   $host;
        # The edge proxy strips the app's path prefix and passes it here; forward it so the
        # server can build correct absolute URLs (signed storage links, springdoc).
        proxy_set_header X-Forwarded-Prefix $http_x_forwarded_prefix;

        # PDF uploads are multipart (Spring caps request size at 12MB); leave headroom.
        client_max_body_size 20m;
        # AI parsing/solving is slow; SSE streams must stay open and unbuffered.
        proxy_read_timeout   600s;
        proxy_send_timeout   600s;
        proxy_buffering      off;
    }

    # OpenAPI spec and Swagger UI (served by springdoc on the server, outside /api), if enabled.
    location ~ ^/(v3/api-docs|swagger-ui) {
        proxy_pass http://server:8081;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $fwd_proto;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header X-Forwarded-Prefix $http_x_forwarded_prefix;
    }
}
