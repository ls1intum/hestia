services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: learninggoalhub-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learninggoalhub}
      POSTGRES_USER: ${POSTGRES_USER:-learninggoalhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learninggoalhub}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learninggoalhub} -d ${POSTGRES_DB:-learninggoalhub}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
