spring:
  application:
    name: workshopper-backend

  security:
    saml2:
      relyingparty:
        registration:
          tum:
            signing:
              credentials:
                - private-key-location: ${SAML_PRIVATE_KEY_LOCATION:classpath:certs/private-key.pem}
                  certificate-location: ${SAML_CERTIFICATE_LOCATION:classpath:certs/certificate.crt}
            assertingparty:
              entity-id: https://tumidp.lrz.de/idp/shibboleth
              metadata-uri: https://login.tum.de/idp/shibboleth

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:workshopper}}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:workshopper}
    password: ${POSTGRES_PASSWORD:workshopper}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: 8081
  forward-headers-strategy: framework

# ── LLM Configuration ──────────────────────────────────────────────
# We now use the shared Hestia LLM defaults (spring.ai.openai properties).
spring.ai.openai.api-key: ${WORKSHOPPER_SAIA_API_KEY}

llm:
  secondary-model: ${LLM_SECONDARY_MODEL:}

logging:
  level:
    com.workshopper: INFO
