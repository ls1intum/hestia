services:
  postgres:
    image: postgres:16
    container_name: workshopper-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workshopper}
      POSTGRES_USER: ${POSTGRES_USER:-workshopper}
      POSTGRES_PASSWORD: ${WORKSHOPPER_POSTGRES_PASSWORD:?set WORKSHOPPER_POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workshopper} -d ${POSTGRES_DB:-workshopper}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  server:
    image: ghcr.io/ls1intum/hestia/workshopper/backend:${IMAGE_TAG:-latest}
    container_name: workshopper-server
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-workshopper}
      POSTGRES_USER: ${POSTGRES_USER:-workshopper}
      POSTGRES_PASSWORD: ${WORKSHOPPER_POSTGRES_PASSWORD:?set WORKSHOPPER_POSTGRES_PASSWORD in .env}
      WORKSHOPPER_SAIA_API_KEY: ${WORKSHOPPER_SAIA_API_KEY:?set WORKSHOPPER_SAIA_API_KEY in .env}
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=70}
      SAML_PRIVATE_KEY_LOCATION: file:/app/certs/private-key.pem
      SAML_CERTIFICATE_LOCATION: file:/app/certs/certificate.crt
    volumes:
      - /opt/hestia/secrets/saml:/app/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 1500m
    restart: unless-stopped

  web:
    image: ghcr.io/ls1intum/hestia/workshopper/frontend:${IMAGE_TAG:-latest}
    container_name: workshopper-web
    expose:
      - "80"
    depends_on:
      - server
    networks:
      - default
      - hestia-edge
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hestia-edge"
      - "traefik.http.routers.workshopper.rule=Host(`${APP_HOST}`) && PathPrefix(`/workshopper`)"
      - "traefik.http.routers.workshopper.entrypoints=websecure"
      - "traefik.http.routers.workshopper.tls=true"
      - "traefik.http.routers.workshopper.middlewares=workshopper-strip"
      - "traefik.http.middlewares.workshopper-strip.stripprefix.prefixes=/workshopper"
      - "traefik.http.services.workshopper.loadbalancer.server.port=80"
    restart: unless-stopped

networks:
  hestia-edge:
    external: true

volumes:
  postgres-data:
