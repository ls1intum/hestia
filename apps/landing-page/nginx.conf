# Static site only — no backend, no /api proxy. The shared Traefik proxy terminates
# TLS and forwards the bare host root here unchanged (no path prefix to strip).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;

    # The site lives entirely at "/" (client "routes" are hash-based, e.g. #/impressum,
    # so they never reach the server). Serve real files; redirect any unknown path to the
    # root instead of lingering on a bogus URL. App prefixes (/examlense, /learninggoalhub,
    # …) are resolved by the shared Traefik proxy before requests ever reach this container.
    location / {
        try_files $uri $uri/ @redirect;
    }

    location @redirect {
        return 302 /;
    }

    # Vite emits content-hashed filenames under /assets — cache them aggressively.
    # Missing assets 404 here (they are not redirected).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
