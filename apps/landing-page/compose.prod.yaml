# HESTIA landing page — a single static web container behind the shared Traefik proxy
# (infra/traefik/). Unlike the other apps it owns no path prefix: it is the root
# catch-all for the bare host. Traefik's Host-only rule at priority 1 loses to every
# Host && PathPrefix rule, so /examlense, /learninggoalhub etc. keep working.
services:
  web:
    image: ghcr.io/ls1intum/hestia/landing-page:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - hestia-edge
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=hestia-edge"
      - "traefik.http.routers.landing.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.landing.priority=1"
      - "traefik.http.routers.landing.entrypoints=websecure"
      - "traefik.http.routers.landing.tls=true"
      - "traefik.http.services.landing.loadbalancer.server.port=80"

networks:
  hestia-edge:
    external: true
