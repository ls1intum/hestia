    <script>
      // Set the theme before the app bundle loads to avoid a flash of the wrong theme.
      // Explicit user choice (localStorage) wins; otherwise follow the OS preference.
      (function () {
        try {
          var stored = localStorage.getItem("hestia-theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();

      // Set the <html lang> before the app loads so it matches the resolved language.
      // Explicit user choice (localStorage) wins; otherwise follow the browser locale.
      (function () {
        try {
          var stored = localStorage.getItem("hestia-language");
          var lang =
            stored === "de" || stored === "en"
              ? stored
              : (navigator.language || "de").toLowerCase().indexOf("de") === 0
                ? "de"
                : "en";
          document.documentElement.lang = lang;
        } catch (e) {
          document.documentElement.lang = "de";
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
