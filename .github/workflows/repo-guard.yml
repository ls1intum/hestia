name: repo guard

# Safety net behind the local pre-commit hook (.githooks/pre-commit): scans the full
# git history for secrets and blocks newly added binary files (lecture PDFs are
# copyrighted; binaries don't review well). Intended to run as required status checks
# on main (branch protection is configured by a repo admin).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks over the checked-out branch history
        env:
          GITLEAKS_VERSION: 8.30.1
        # --log-opts limits the scan to HEAD's history (main + the PR commits).
        # Without it gitleaks scans every ref, so a stale leak on any unrelated
        # branch would fail every PR.
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks git --log-opts="--full-history HEAD" --no-banner --redact .

  file-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Block newly added binary files
        # Pin the base by SHA, not branch name: when a stacked PR's base branch is
        # deleted (e.g. after merging the PR below it), origin/<base_ref> no longer
        # exists at checkout time and the diff fails.
        run: .githooks/file-guard.sh "${{ github.event.pull_request.base.sha }}" HEAD
