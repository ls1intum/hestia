name: learninggoalhub CI/CD

# Build the two app images and (outside of PRs) deploy them, using the shared ls1intum
# reusable workflows. Scoped to learninggoalhub via paths so other apps in the monorepo
# are unaffected.
#
#   PR               -> build images (pr-<N> tags), no deploy   [validation]
#   push to main     -> build (latest) + deploy to Staging
#   release published -> build (<tag>)  + deploy to Production (approval gate via the env)
#   workflow_dispatch -> build + deploy to the chosen environment/tag (manual)
#
# Everything runs on GitHub-hosted runners. The VMs sit behind the LRZ VPN, so the deploy
# reusable reaches them over SSH through the chair's shared deployment gateway/bastion
# (DEPLOYMENT_GATEWAY_* — provided as org-level secrets/vars and pulled in via
# `secrets: inherit`), exactly like the other ls1intum apps (e.g. Hephaestus). See DEPLOY.md.

on:
  push:
    branches: [main]
    paths:
      - "apps/learninggoalhub/**"
      - "libs/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - ".github/workflows/learninggoalhub-cicd.yml"
  pull_request:
    paths:
      - "apps/learninggoalhub/**"
      - "libs/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - ".github/workflows/learninggoalhub-cicd.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to deploy to"
        type: choice
        options: [Staging, Production]
        default: Staging
      image-tag:
        description: "Image tag to deploy (must already exist in GHCR)"
        type: string
        default: latest

concurrency:
  group: learninggoalhub-cicd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-server:
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@main
    with:
      image-name: ${{ github.repository }}/learninggoalhub/server
      docker-file: apps/learninggoalhub/server/Dockerfile
      # Repo root: the server is a multi-module Gradle build (depends on :libs:shared-llm).
      docker-context: .
      tags: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}

  build-client:
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@main
    with:
      image-name: ${{ github.repository }}/learninggoalhub/client
      docker-file: apps/learninggoalhub/client/Dockerfile
      docker-context: apps/learninggoalhub/client
      tags: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}

  deploy:
    needs: [build-server, build-client]
    # PRs only validate the build; everything else deploys.
    if: github.event_name != 'pull_request'
    # Runs on a GitHub-hosted runner and SSHes to the VM through the chair's deployment
    # gateway. The reusable workflow applies the GitHub environment protection rules, so a
    # deploy to the `Production` environment (required reviewer) pauses until approved.
    uses: ls1intum/.github/.github/workflows/deploy-docker-compose.yml@main
    with:
      environment: ${{ (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'Production')) && 'Production' || 'Staging' }}
      docker-compose-file: apps/learninggoalhub/compose.prod.yaml
      main-image-name: ${{ github.repository }}/learninggoalhub/server
      image-tag: ${{ github.event_name == 'release' && github.event.release.tag_name || (github.event_name == 'workflow_dispatch' && inputs.image-tag) || 'latest' }}
      deployment-base-path: /opt/hestia/learninggoalhub
    # Passes the VM + gateway connection secrets/vars (VM_HOST, VM_USERNAME,
    # VM_SSH_PRIVATE_KEY, DEPLOYMENT_GATEWAY_*) and the app secrets/vars (POSTGRES_PASSWORD,
    # SAIA_API_KEY, APP_HOST, APP_PATH_PREFIX, ...). The reusable workflow writes them into
    # .env on the VM next to IMAGE_TAG, then runs docker compose pull && up -d.
    secrets: inherit
