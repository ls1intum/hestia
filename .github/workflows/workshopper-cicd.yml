name: workshopper CI/CD

# Build the two app images and (outside of PRs) deploy them, using the shared ls1intum
# reusable workflows. Scoped to workshopper via paths so other apps in the monorepo
# are unaffected.
#
#   PR               -> [test backend] -> build images (pr-<N> tags), no deploy   [validation]
#   push to main     -> [test backend] -> build (latest) + deploy to Staging
#   release published -> [test backend] -> build (<tag>)  + deploy to Production (approval gate via the env)
#   workflow_dispatch -> [test backend] -> build + deploy to the chosen environment/tag (manual)
#
# Everything runs on GitHub-hosted runners. The VMs sit behind the LRZ VPN, so the deploy
# reusable reaches them over SSH through the chair's shared deployment gateway/bastion
# (DEPLOYMENT_GATEWAY_* — provided as org-level secrets/vars and pulled in via
# `secrets: inherit`), exactly like the other ls1intum apps (e.g. Hephaestus). See DEPLOY.md.

on:
  push:
    branches: [main]
    paths:
      - "apps/workshopper/**"
      - "libs/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - ".github/workflows/workshopper-cicd.yml"
  pull_request:
    paths:
      - "apps/workshopper/**"
      - "libs/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - ".github/workflows/workshopper-cicd.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to deploy to"
        type: choice
        options: [Staging, Production]
        default: Staging
      image-tag:
        description: "Image tag to deploy (must already exist in GHCR)"
        type: string
        default: latest

concurrency:
  group: workshopper-cicd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # ── Test ────────────────────────────────────────────────────────────────────
  # Runs the backend unit + slice tests. build-server and build-client only
  # start after this job succeeds, so a test failure blocks the whole pipeline.
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Workshopper backend tests
        run: ./gradlew :apps:workshopper:backend:test --tests "com.workshopper.*"

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workshopper-test-report
          path: apps/workshopper/backend/build/reports/tests/test/

  # ── Build ────────────────────────────────────────────────────────────────────
  build-backend:
    needs: test-backend
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@main
    with:
      image-name: ${{ github.repository }}/workshopper/backend
      docker-file: apps/workshopper/backend/Dockerfile
      # Repo root: the backend is a multi-module Gradle build (depends on :libs:shared-llm).
      docker-context: .
      tags: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}

  build-frontend:
    needs: test-backend
    uses: ls1intum/.github/.github/workflows/build-and-push-docker-image.yml@main
    with:
      image-name: ${{ github.repository }}/workshopper/frontend
      docker-file: apps/workshopper/frontend/Dockerfile
      docker-context: apps/workshopper/frontend
      tags: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    needs: [build-backend, build-frontend]
    # PRs only validate the build; everything else deploys.
    if: github.event_name != 'pull_request'
    uses: ls1intum/.github/.github/workflows/deploy-docker-compose.yml@main
    with:
      environment: ${{ (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'Production')) && 'Production' || 'Staging' }}
      docker-compose-file: apps/workshopper/compose.deploy.yaml
      main-image-name: ${{ github.repository }}/workshopper/backend
      image-tag: ${{ github.event_name == 'release' && github.event.release.tag_name || (github.event_name == 'workflow_dispatch' && inputs.image-tag) || 'latest' }}
      deployment-base-path: /opt/hestia/workshopper
    # Passes the VM + gateway connection secrets/vars (VM_HOST, VM_USERNAME,
    # VM_SSH_PRIVATE_KEY, DEPLOYMENT_GATEWAY_*) and the app secrets/vars (POSTGRES_PASSWORD,
    # LLM_API_KEY, APP_HOST, APP_PATH_PREFIX, ...). The reusable workflow writes them into
    # .env on the VM next to IMAGE_TAG, then runs docker compose pull && up -d.
    secrets: inherit
